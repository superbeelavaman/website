<!DOCTYPE html>
<html>
    <head>
        <title>Bad Request</title>
        <style>
            body {
                background-image: url("/Images/DingusGrass.jpg");
                background-color: #0f8340;
                background-position: center;
                background-size: cover;
                background-repeat: no-repeat;
                min-height: 100vh;
                min-height: 100svh
            }
            .center {
                background-color: white;
                width: fit-content;
                padding: 5mm;
                margin: auto;
            }
            .dense {
                margin: 1mm;
            }
        </style>
    </head>
    <body>
        <div class="center">
            <h1 style="color: #a00;" class="dense">Error 400: Bad Request.</h1>
            <p class="dense">
                There is an issue with your web request.<br>If possible, please verify all required name/value pairs are present in the query string of the URL.
            </p>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Too Many Requests</title>
        <style>
            body {
                background-color: #0f8340;
                background-position: center;
                background-size: cover;
                min-height: 100vh;
                min-height: 100svh
            }
            .center {
                background-color: white;
                width: fit-content;
                padding: 5mm;
                margin: auto;
            }
            .dense {
                margin: 1mm;
            }
        </style>
    </head>
    <body>
        <div class="center">
            <h1 style="color: #a00;" class="dense">Error 429: Too many Requests</h1>
            <p class="dense">
                You are sending too many requests. If this is caused by an error in a page, please contact the site admin.
            </p>
        </div>
    </body>
</html>
